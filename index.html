<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Profile Card</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Manrope', sans-serif;
  background: linear-gradient(135deg, #0a0f1c 0%, #0f2a3f 100%);
  position: relative;
  min-height: 100vh;
  letter-spacing: 0.025em;
  line-height: 1.5;
  padding: 2rem 1rem;
}

body::after {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 50% 50%, transparent 50%, rgba(10, 15, 28, 0.3) 100%);
  pointer-events: none;
}

h2 {
  font-family: 'Space Grotesk', sans-serif;
  letter-spacing: -0.02em;
}

/* Card */
.card {
  position: relative;
  border-radius: 30px;
  transition: transform 0.4s ease, box-shadow 0.4s ease;
  box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
  animation: fadeInUp 0.8s ease-out;
  width: 100%;
  max-width: 420px;
}

.card::before {
  content: "";
  position: absolute;
  inset: -30px;
  background: radial-gradient(circle, rgba(15, 42, 63, 0.4), transparent 60%);
  border-radius: 60px;
  filter: blur(20px);
  z-index: -1;
  pointer-events: none;
}

.card:hover {
  transform: translateY(-15px) scale(1.02);
  box-shadow: 0 35px 70px rgba(0,0,0,0.6), 0 0 40px rgba(15, 42, 63, 0.3), inset 0 1px 0 rgba(255,255,255,0.1);
}

/* Image */
.card img {
  transition: transform 0.6s ease;
}

.card:hover img {
  transform: scale(1.1);
}

/* Overlay */
.overlay {
  background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.35));
}

/* Glass - Premium Apple/macOS Style */
.glass {
  position: relative;
  background: linear-gradient(to bottom, rgba(10, 15, 28, 0.4), rgba(10, 15, 28, 0.2));
  backdrop-filter: blur(20px) saturate(1.2) brightness(1.0);
  -webkit-backdrop-filter: blur(20px) saturate(1.2) brightness(1.0);
  border: 1px solid rgba(255, 255, 255, 0.15);
  box-shadow: inset 0 1px 4px rgba(255, 255, 255, 0.1), inset 0 -2px 8px rgba(0, 0, 0, 0.3);
  border-radius: 30px;
}

.glass::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
  pointer-events: none;
}

/* Button */
.btn {
  background: linear-gradient(135deg, #10b981, #059669);
  position: relative;
  overflow: hidden;
  transition: 0.3s;
}

.btn {
  box-shadow: 0 0 12px rgba(16,185,129,0.35);
}

.btn:hover {
  transform: scale(1.04);
  box-shadow: 0 0 30px rgba(16,185,129,0.85), 0 0 50px rgba(16,185,129,0.4);
}

.btn:active {
  transform: scale(0.98);
  box-shadow: 0 0 20px rgba(16,185,129,0.7);
}

.btn::before {
  content: "";
  position: absolute;
  width: 220%;
  height: 220%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.5), transparent);
  transform: rotate(25deg);
  top: -100%;
  left: -100%;
  transition: 0.45s;
}

.btn:hover::before {
  top: 100%;
  left: 100%;
}

/* Skill */
.skill {
  background: rgba(255,255,255,0.08);
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 12px;
  transition: 0.3s;
}

.skill:hover {
  background: #10b981;
  color: white;
}

/* Social */
.social {
  transition: transform 0.3s ease, color 0.3s ease, filter 0.3s ease;
  cursor: pointer;
  color: rgba(148, 163, 184, 0.9); /* more visible neutral state */
}

.social:hover,
.social:focus-visible {
  transform: scale(1.3);
  color: #34d399; /* bright green accent */
  filter: drop-shadow(0 0 10px rgba(52,211,153,0.9));
  outline: none;
}

.social:focus-visible {
  box-shadow: 0 0 0 3px rgba(52,211,153,0.4);
}


@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.card .relative {
  height: 330px;
}

.glass {
  padding: 1.2rem;
}

@media (max-width: 640px) {
  .card {
    width: 90%;
    max-width: 360px;
  }
  .glass {
    padding: 1.25rem;
  }
  h2 {
    font-size: 1.25rem;
  }
  .card .glass p {
    font-size: 0.875rem;
  }
}

@media (max-width: 480px) {
  .card {
    max-width: 340px;
  }
  .card .relative {
    height: 320px;
  }
  .flex.justify-center.gap-6 {
    gap: 1.5rem;
  }
}
</style>
</head>

<body class="flex items-center justify-center min-h-screen text-white">

<div class="card w-full max-w-[420px]">

  <!-- Image -->
  <div class="relative h-[330px] overflow-hidden">
    <img src="./images/profile.png" alt="profile"
         class="w-full h-full object-cover"
         style="filter: brightness(1.1) contrast(1.05);">
    <div class="absolute inset-0 overlay"></div>
  </div>

  <!-- Content -->
  <div class="glass p-6 pb-8 -mt-20 relative z-10">

    <!-- Name -->
    <div class="flex items-center justify-center gap-2 mb-3">
      <h2 class="text-2xl font-bold text-center">Durgesh Kumar</h2>
      
    </div>

    <!-- Role -->
    <p class="text-sm text-gray-300 text-center mb-2 font-medium">
      Full Stack Developer • MERN | Django Specialist

    <!-- Location -->

        </svg>
      </a>

      <!-- LinkedIn -->
      <a href="https://www.linkedin.com/in/durgeshkumardk/" target="_blank" rel="noopener noreferrer" aria-label="Durgesh Kumar on LinkedIn">
        <svg class="social w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
          <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 1 1 0-4.124 2.062 2.062 0 0 1 0 4.124zM7.876 9H5.338V20.452H7.876V9z"/>
        </svg>
      </a>

      <!-- Twitter -->
      <a href="https://twitter.com/yourusername" target="_blank">
        <svg class="social w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
          <path d="M18.901 1.153h3.68l-8.04 9.19L24 22.846h-7.406l-5.8-7.584-6.638 7.584H.474l8.6-9.83L0 1.154h7.594l5.243 6.932z"/>
        </svg>
      </a>

    </div>

  </div>

</div>

<script>
  lucide.createIcons();
</script>

</body>
</html>
