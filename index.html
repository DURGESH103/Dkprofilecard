<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Durgesh Kumar — Full Stack Developer</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; }

  /* ── Base ── */
  body {
    font-family: 'Manrope', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2.5rem 1rem;
    background: #060b14;
    overflow-x: hidden;
  }

  /* ── Ambient background orbs ── */
  .bg-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    pointer-events: none;
    z-index: 0;
  }
  .bg-orb-1 {
    width: 520px; height: 520px;
    background: radial-gradient(circle, rgba(16,185,129,0.13) 0%, transparent 70%);
    top: -120px; left: -160px;
    animation: orbFloat 10s ease-in-out infinite alternate;
  }
  .bg-orb-2 {
    width: 420px; height: 420px;
    background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%);
    bottom: -100px; right: -120px;
    animation: orbFloat 13s ease-in-out infinite alternate-reverse;
  }
  .bg-orb-3 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(6,182,212,0.08) 0%, transparent 70%);
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    animation: orbFloat 8s ease-in-out infinite alternate;
  }

  @keyframes orbFloat {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(30px, 20px) scale(1.08); }
  }

  /* ── Card ── */
  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 400px;
    border-radius: 28px;
    background: linear-gradient(160deg, rgba(255,255,255,0.055) 0%, rgba(255,255,255,0.018) 100%);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04) inset,
      0 32px 64px rgba(0,0,0,0.55),
      0 8px 24px rgba(0,0,0,0.35),
      0 0 80px rgba(16,185,129,0.06);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
    transition: transform 0.45s cubic-bezier(0.22,1,0.36,1),
                box-shadow 0.45s cubic-bezier(0.22,1,0.36,1);
    overflow: hidden;
  }

  .card:hover {
    transform: translateY(-10px) scale(1.015);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.07) inset,
      0 48px 80px rgba(0,0,0,0.6),
      0 12px 32px rgba(0,0,0,0.4),
      0 0 120px rgba(16,185,129,0.12);
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(40px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── Top glow line ── */
  .card-glow-line {
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(16,185,129,0.6), rgba(99,102,241,0.4), transparent);
    border-radius: 999px;
    z-index: 2;
  }

  /* ── Image section ── */
  .img-wrap {
    position: relative;
    height: 300px;
    overflow: hidden;
  }

  .img-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: top center;
    filter: brightness(1.05) contrast(1.08) saturate(1.1);
    transition: transform 0.7s cubic-bezier(0.22,1,0.36,1);
  }

  .card:hover .img-wrap img {
    transform: scale(1.07);
  }

  /* gradient fade into content */
  .img-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(6,11,20,0) 30%,
      rgba(6,11,20,0.5) 65%,
      rgba(6,11,20,0.92) 100%
    );
  }

  /* ── Status badge ── */
  .status-badge {
    position: absolute;
    top: 14px; right: 14px;
    z-index: 3;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 999px;
    background: rgba(6,11,20,0.65);
    border: 1px solid rgba(16,185,129,0.35);
    backdrop-filter: blur(10px);
    font-size: 11px;
    font-weight: 600;
    color: #34d399;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #10b981;
    box-shadow: 0 0 8px #10b981;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.6; transform: scale(0.85); }
  }

  /* ── Content panel ── */
  .content {
    padding: 1.6rem 1.6rem 1.8rem;
    position: relative;
  }

  /* ── Name ── */
  .name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.55rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.15;
    background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.35rem;
    text-align: center;
  }

  /* ── Role ── */
  .role {
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #10b981;
    text-align: center;
    margin-bottom: 0.9rem;
  }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    margin: 0.9rem 0;
  }

  /* ── Bio ── */
  .bio {
    font-size: 0.82rem;
    color: rgba(203,213,225,0.75);
    text-align: center;
    line-height: 1.65;
    margin-bottom: 1rem;
  }

  /* ── Stats row ── */
  .stats {
    display: flex;
    justify-content: center;
    gap: 0;
    margin-bottom: 1.2rem;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
    overflow: hidden;
    background: rgba(255,255,255,0.03);
  }

  .stat {
    flex: 1;
    padding: 0.7rem 0.5rem;
    text-align: center;
    position: relative;
  }

  .stat + .stat::before {
    content: '';
    position: absolute;
    left: 0; top: 20%; bottom: 20%;
    width: 1px;
    background: rgba(255,255,255,0.07);
  }

  .stat-num {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 3px;
  }

  .stat-label {
    font-size: 0.65rem;
    font-weight: 500;
    color: rgba(148,163,184,0.7);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* ── Skills ── */
  .skills {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    margin-bottom: 1.3rem;
  }

  .skill-tag {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 4px 11px;
    border-radius: 999px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(203,213,225,0.85);
    transition: all 0.25s ease;
    cursor: default;
  }

  .skill-tag:hover {
    background: rgba(16,185,129,0.15);
    border-color: rgba(16,185,129,0.4);
    color: #6ee7b7;
  }

  /* ── Button ── */
  .btn-hire {
    position: relative;
    width: 100%;
    padding: 0.85rem 1rem;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: #fff;
    background: linear-gradient(135deg, #10b981 0%, #059669 50%, #0d9488 100%);
    box-shadow: 0 4px 20px rgba(16,185,129,0.4), 0 1px 0 rgba(255,255,255,0.15) inset;
    overflow: hidden;
    transition: transform 0.25s cubic-bezier(0.22,1,0.36,1),
                box-shadow 0.25s ease;
    margin-bottom: 1.4rem;
  }

  .btn-hire::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, transparent 60%);
    border-radius: inherit;
    pointer-events: none;
  }

  /* shimmer sweep */
  .btn-hire::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.28), transparent);
    transform: skewX(-20deg);
    transition: left 0.55s ease;
  }

  .btn-hire:hover::after { left: 160%; }

  .btn-hire:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 8px 32px rgba(16,185,129,0.55), 0 0 60px rgba(16,185,129,0.2), 0 1px 0 rgba(255,255,255,0.2) inset;
  }

  .btn-hire:active {
    transform: translateY(0) scale(0.98);
    box-shadow: 0 2px 12px rgba(16,185,129,0.4);
  }

  .btn-hire-inner {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  /* ── Social row ── */
  .social-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .social-link {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 42px; height: 42px;
    border-radius: 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.09);
    color: rgba(148,163,184,0.85);
    transition: all 0.28s cubic-bezier(0.22,1,0.36,1);
    text-decoration: none;
    flex-shrink: 0;
  }

  .social-link svg {
    width: 18px; height: 18px;
    display: block;
    flex-shrink: 0;
  }

  .social-link:hover {
    transform: translateY(-3px) scale(1.1);
    background: rgba(16,185,129,0.15);
    border-color: rgba(16,185,129,0.45);
    color: #34d399;
    box-shadow: 0 6px 20px rgba(16,185,129,0.25), 0 0 0 1px rgba(16,185,129,0.2);
  }

  .social-link:active {
    transform: translateY(0) scale(0.96);
  }

  /* ── Location chip ── */
  .location-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.72rem;
    color: rgba(148,163,184,0.7);
    font-weight: 500;
    margin-bottom: 0.9rem;
    justify-content: center;
    width: 100%;
  }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    body { padding: 1.5rem 0.75rem; align-items: flex-start; }
    .card { max-width: 100%; border-radius: 22px; }
    .img-wrap { height: 260px; }
    .content { padding: 1.3rem 1.3rem 1.6rem; }
    .name { font-size: 1.35rem; }
    .social-link { width: 44px; height: 44px; border-radius: 12px; }
    .social-row { gap: 10px; }
  }

  @media (max-width: 360px) {
    .social-link { width: 40px; height: 40px; }
    .social-row { gap: 8px; }
    .name { font-size: 1.2rem; }
  }
</style>
</head>

<body>

  <script>lucide.createIcons();</script>
</body>
</html>
